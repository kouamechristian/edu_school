vich_uploader:
    db_driver: orm
    mappings:
        pre_registration_documents:
            uri_prefix: /uploads/pre-registration-documents
            upload_destination: '%kernel.project_dir%/public/uploads/pre-registration-documents'
            namer: vich_uploader.namer_uniqid
            directory_namer: vich_uploader.directory_namer_date