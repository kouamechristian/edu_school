# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    annotations: false
    http_method_override: false
    handle_all_throwables: true

    # Versioning d'assets : le package « versioned » ajoute ?v… aux fichiers concernés
    # (ex. le CSS de l'espace parent) pour forcer le rechargement après une mise à jour.
    # Incrémenter la version à chaque modification du fichier concerné.
    assets:
        packages:
            versioned:
                version: 'v2'

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        # Durée de vie du cookie de session (en secondes)
        cookie_lifetime: 3600  # 15 minutes (900 secondes)
        # Durée maximale avant que la session soit nettoyée (en secondes)
        gc_maxlifetime: 3600  # 15 minutes

    #esi: true
    #fragments: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
