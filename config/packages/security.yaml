security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    role_hierarchy:
        # ── Rôles de base (espaces personnels) ──
        ROLE_PARENT: ROLE_USER

        # ── Rôles opérationnels (personnel) ──
        ROLE_ENSEIGNANT: ROLE_USER
        ROLE_EDUCATEUR: ROLE_USER
        # ROLE_INSCRIPTION : Gestion des élèves uniquement.
        ROLE_INSCRIPTION: ROLE_USER
        # ROLE_CORRESPONDANT_FICHIER : ses documents + la Gestion des élèves (via ROLE_INSCRIPTION).
        ROLE_CORRESPONDANT_FICHIER: [ROLE_INSCRIPTION]

        # ── ROLE_CAISSE est indépendant : il n'est hérité par aucun rôle supérieur.
        #    Il couvre la Gestion financière (caisse, paiements, factures, frais, bourses,
        #    plans, transactions) ET la Gestion des élèves (via ROLE_INSCRIPTION). ──
        ROLE_CAISSE: [ROLE_INSCRIPTION]

        # ── Le directeur : seulement Académique, Notes & Évaluations et Gestion (absences) ──
        ROLE_DIRECTEUR: [ROLE_ENSEIGNANT, ROLE_EDUCATEUR]

        # ── L'administrateur dispose de tout (sauf la caisse, indépendante) ──
        ROLE_ADMIN: [ROLE_DIRECTEUR, ROLE_INSCRIPTION, ROLE_CORRESPONDANT_FICHIER]

        # ── Le fondateur supervise (accès complet, limité à ses établissements) ──
        ROLE_FONDATEUR: [ROLE_ADMIN]

        # ── Le super-administrateur est au sommet de la hiérarchie ──
        ROLE_SUPER_ADMIN: [ROLE_FONDATEUR]
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                # Pas de "property" : on utilise UserRepository::loadUserByIdentifier
                # qui accepte le nom d'utilisateur OU l'adresse e-mail.
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\MainAuthenticator
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login
            
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 31536000  # Durée de vie du cookie "remember me"

            login_throttling:
                max_attempts: 3
                interval: '2 minutes'

                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
         - { path: ^/login$, roles: PUBLIC_ACCESS }
         # Webhooks externes (passerelle de paiement) : accès public, sécurisés par signature.
         - { path: ^/webhook, roles: PUBLIC_ACCESS }
         # Portail Parent : réservé aux parents (et super-admins par héritage).
         - { path: ^/parent, roles: ROLE_PARENT }
         - { path: ^/, roles: ROLE_USER }


when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
