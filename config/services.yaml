# This file is the entry point to configure your own services and load the default configuration.
# If you want to remove a service, deprecate it, or change its class, you can apply the changes here.
#
# If you are *not* using the default services.yaml file in your package, you *must* pass an
# absolute path to this file's location to the `imports` key in your package's services.yaml (e.g.
# imports: ['%kernel.project_dir%/config/services.yaml'])
#
# See https://symfony.com/doc/current/configuration.html#importing-the-routing-configuration

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # Logger dédié au canal "payment" (injecté là où l'argument s'appelle $paymentLogger).
            $paymentLogger: '@monolog.logger.payment'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\AI\AIService:
        arguments:
            $apiKey: '%env(ANTHROPIC_API_KEY)%'
            $model: '%env(AI_MODEL)%'
            $maxTokens: '%env(int:AI_MAX_TOKENS)%'
            $cacheTtl: '%env(int:AI_CACHE_TTL)%'
            $enabled: '%env(bool:AI_ENABLED)%'

    # Passerelle de paiement GeniusPay.
    # Valeurs globales par défaut (.env / .env.local) ; surchargées par établissement
    # via MobileMoneyConfig (espace Administration > Identifiants Mobile Money).
    App\Service\Payment\GeniusPayClient:
        arguments:
            $baseUrl: '%env(GENIUSPAY_BASE_URL)%'
            $apiKey: '%env(GENIUSPAY_API_KEY)%'
            $apiSecret: '%env(GENIUSPAY_API_SECRET)%'

    App\Service\Payment\GeniusPayCredentialsProvider:
        arguments:
            $defaultBaseUrl: '%env(GENIUSPAY_BASE_URL)%'
            $defaultApiKey: '%env(GENIUSPAY_API_KEY)%'
            $defaultApiSecret: '%env(GENIUSPAY_API_SECRET)%'
            $defaultWebhookSecret: '%env(GENIUSPAY_WEBHOOK_SECRET)%'

    App\Service\Payment\GeniusPaySignatureVerifier:
        arguments:
            $verifyEnabled: '%env(bool:GENIUSPAY_WEBHOOK_VERIFY)%'

    App\Service\Payment\PaymentInitiator:
        arguments:
            $webhookUrlOverride: '%env(GENIUSPAY_WEBHOOK_URL)%'